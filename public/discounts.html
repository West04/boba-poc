<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boba Shop – Discounts</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Boba Shop</h1>
      <p>Fresh boba drinks, made to order</p>
      <nav>
        <a href="/" class="nav-link">Menu</a>
        <a href="/discounts.html" class="nav-link active">Discounts</a>
        <a href="/catalog.html" class="nav-link">Categories &amp; Options</a>
      </nav>
    </header>

    <main>
      <div class="toolbar">
        <button id="add-discount-btn" class="btn-add">+ Add Discount</button>
      </div>
      <div id="discounts" class="menu-grid"></div>
    </main>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3 id="sidebar-title"></h3>
        <button class="sidebar-close" id="sidebar-close">✕</button>
      </div>
      <div class="sidebar-body" id="sidebar-body"></div>
      <div class="sidebar-footer">
        <button class="btn-cancel" id="sidebar-cancel">Cancel</button>
        <button class="btn-save" id="sidebar-save">Save</button>
      </div>
    </aside>

    <script src="sidebar.js"></script>
    <script src="discounts.js"></script>
  </body>
</html>
