<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boba Shop – Categories &amp; Options</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Boba Shop</h1>
      <p>Fresh boba drinks, made to order</p>
      <nav>
        <a href="/" class="nav-link">Menu</a>
        <a href="/discounts.html" class="nav-link">Discounts</a>
        <a href="/catalog.html" class="nav-link active">Categories &amp; Options</a>
      </nav>
    </header>

    <main>
      <section class="catalog-section">
        <div class="catalog-section-header">
          <h2 class="catalog-section-title">Categories</h2>
          <button id="add-category-btn" class="btn-add">+ Add Category</button>
        </div>
        <div id="categories" class="menu-grid"></div>
      </section>

      <section class="catalog-section">
        <div class="catalog-section-header">
          <h2 class="catalog-section-title">Modifier Options</h2>
          <button id="add-modifier-list-btn" class="btn-add">+ Add Option List</button>
        </div>
        <div id="modifier-lists" class="menu-grid"></div>
      </section>
    </main>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3 id="sidebar-title"></h3>
        <button class="sidebar-close" id="sidebar-close">✕</button>
      </div>
      <div class="sidebar-body" id="sidebar-body"></div>
      <div class="sidebar-footer">
        <button class="btn-cancel" id="sidebar-cancel">Cancel</button>
        <button class="btn-save" id="sidebar-save">Save</button>
      </div>
    </aside>

    <script src="sidebar.js"></script>
    <script src="catalog.js"></script>
  </body>
</html>
